<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUY Studio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:#f8fafc;
    color:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px;
}

.container{
    width:100%;
    max-width:360px;
    text-align:center;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h1{
    font-size:30px;
    margin-bottom:8px;
}

.desc{
    color:#6b7280;
    font-size:15px;
    line-height:1.6;
    margin-bottom:32px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    width:100%;
    padding:16px;
    margin-bottom:14px;

    text-decoration:none;
    font-weight:600;
    font-size:16px;

    color:#111827;
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:14px;

    transition:.2s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.footer{
    margin-top:28px;
    color:#9ca3af;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

    <img src="KuyLogo.png" class="logo" alt="KUY Studio">

    <h1>KUY Studio</h1>

    <p class="desc">
        Support pengembangan project KUY Studio.<br>
        Terima kasih atas dukungan dan semangat kalian ❤️
    </p>

    <a class="btn" href="https://bagibagi.co/KUY.RBX" target="_blank">
        🎮 BagiBagi
    </a>

    <a class="btn" href="https://sociabuzz.com/kuystudio" target="_blank">
        ☕ Sociabuzz
    </a>

    <div class="footer">
        © 2026 KUY Studio
    </div>

</div>

</body>
</html>
