<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUY Studio</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Inter,Arial,sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    overflow:hidden;
}
.background-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0;
    transition:
    opacity 1.2s ease;
}
.background-video.ready{
    opacity:1;
}
.video-overlay{
    position:fixed;
    inset:0;
    z-index:-1;
    background:
    linear-gradient(
        180deg,
        rgba(0,0,0,.15),
        rgba(0,0,0,.35)
    );
}
.loader{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    transition:
    opacity .8s ease,
    visibility .8s ease;
}
.loader.hide{
    opacity:0;
    visibility:hidden;
}
.loader-content{
    text-align:center;
    color:white;
    animation:
    loaderAppear .8s ease;
}
.loader-logo{
    width:85px;
    height:85px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.9);
    box-shadow:
    0 10px 35px rgba(0,0,0,.45);
    animation:
    logoPulse 1.8s ease-in-out infinite;
}
.loader-title{
    margin-top:18px;
    font-size:20px;
    font-weight:700;
    letter-spacing:.5px;
}
.loader-text{
    margin-top:6px;
    font-size:13px;
    color:rgba(255,255,255,.65);
}
.loader-spinner{
    width:28px;
    height:28px;
    margin:18px auto 0;
    border-radius:50%;
    border:
    3px solid rgba(255,255,255,.18);
    border-top-color:#fdba74;
    animation:
    spin .8s linear infinite;
}
.container{
    width:100%;
    max-width:380px;
    text-align:center;
    background:
    rgba(255,255,255,.13);
    backdrop-filter:
    blur(5px);
    -webkit-backdrop-filter:
    blur(18px);
    border:
    1px solid rgba(255,255,255,.25);
    border-radius:26px;
    padding:35px 25px;
    box-shadow:
    0 25px 60px rgba(0,0,0,.25);
    opacity:0;
    transform:
    translateY(25px)
    scale(.97);
    transition:
    opacity .9s ease,
    transform .9s cubic-bezier(.22,1,.36,1);
}
.container.show{
    opacity:1;
    transform:
    translateY(0)
    scale(1);
}
.logo{
    width:110px;
    height:110px;
    object-fit:cover;
    border-radius:50%;
    margin-bottom:18px;
    border:
    4px solid rgba(255,255,255,.9);
    box-shadow:
    0 10px 30px rgba(0,0,0,.3);
    opacity:0;
    transform:
    scale(.8);
    transition:
    opacity .7s ease .2s,
    transform .7s cubic-bezier(.22,1,.36,1) .2s;
}
.container.show .logo{
    opacity:1;
    transform:
    scale(1);
}
h1{
    color:white;
    font-size:32px;
    margin-bottom:8px;
    letter-spacing:.5px;
    opacity:0;
    transform:
    translateY(10px);
    transition:
    opacity .6s ease .35s,
    transform .6s ease .35s;
}
.desc{
    color:rgba(255,255,255,.9);
    line-height:1.6;
    font-size:15px;
    margin-bottom:20px;
    opacity:0;
    transform:
    translateY(10px);
    transition:
    opacity .6s ease .45s,
    transform .6s ease .45s;
}
.container.show h1,
.container.show .desc{
    opacity:1;
    transform:
    translateY(0);
}
.note{
    background:
    rgba(255,247,237,.95);
    border:
    1px solid #fdba74;
    color:#9a3412;
    border-radius:16px;
    padding:14px;
    margin-bottom:20px;
    font-size:14px;
    line-height:1.5;
    box-shadow:
    0 8px 20px rgba(0,0,0,.12);
    opacity:0;
    transform:
    translateY(15px);
    transition:
    opacity .7s ease .55s,
    transform .7s ease .55s;
}
.container.show .note{
    opacity:1;
    transform:
    translateY(0);
}
.link-list{
    background:
    rgba(255,255,255,.10);
    border:
    1px solid rgba(255,255,255,.25);
    border-radius:20px;
    padding:14px;
    margin-bottom:20px;
    box-shadow:
    0 12px 30px rgba(0,0,0,.18);
    backdrop-filter:
    blur(10px);
    opacity:0;
    transform:
    translateY(15px);
    transition:
    opacity .7s ease .65s,
    transform .7s ease .65s;
}
.container.show .link-list{
    opacity:1;
    transform:
    translateY(0);
}
.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:15px;
    margin-bottom:10px;
    text-decoration:none;
    color:white;
    background:
    rgba(255,255,255,.16);
    border:
    1px solid #fdba74;
    border-radius:14px;
    font-weight:700;
    font-size:16px;
    box-shadow:
    0 6px 18px rgba(0,0,0,.12);
    transition:
    transform .25s ease,
    background .25s ease,
    color .25s ease,
    box-shadow .25s ease;
}
.btn:last-child{
    margin-bottom:0;
}
.btn:hover{
    transform:
    translateY(-3px);
    background:white;
    color:#fdba74;
    box-shadow:
    0 12px 30px rgba(0,0,0,.25);
}
.btn:active{
    transform:
    scale(.97);
}
.footer{
    margin-top:25px;
    color:rgba(255,255,255,.75);
    font-size:13px;
    opacity:0;
    transition:
    opacity .7s ease .8s;
}
.container.show .footer{
    opacity:1;
}
@keyframes logoPulse{
    0%,
    100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
}
@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
@keyframes loaderAppear{
    from{
        opacity:0;
        transform:
        translateY(15px);
    }
    to{
        opacity:1;
        transform:
        translateY(0);
    }
}
@media(max-width:480px){
    .container{
        padding:
        30px 20px;
    }
    .logo{
        width:100px;
        height:100px;
    }
    h1{
        font-size:28px;
    }
}
</style>
</head>
<body>
<div class="loader" id="loader">
    <div class="loader-content">
        <img
            src="assets/KuyLogo.png"
            class="loader-logo"
            alt="KUY Studio"
        >
        <div class="loader-title">
            KUY Studio
        </div>
        <div class="loader-text">
            Menyiapkan halaman...
        </div>
        <div class="loader-spinner"></div>
    </div>
</div>
<video
    autoplay
    muted
    loop
    playsinline
    class="background-video"
    id="backgroundVideo"
>
    <source
        src="assets/background.mp4"
        type="video/mp4"
    >
</video>
<div class="video-overlay"></div>
<div class="container" id="mainContent">
    <img
        src="assets/KuyLogo.png"
        class="logo"
        alt="KUY Studio"
    >
    <h1>
        Kuy Studio
    </h1>
    <p class="desc">
        Terima kasih atas support dan dukungannya
    </p>
    <div class="note">
        <strong>NOTE</strong><br>
        Masukkan
        <strong>Username Roblox</strong>
        kalian agar data dapat masuk ke map.
    </div>
    <div class="link-list">
        <a
            class="btn"
            href="https://bagibagi.co/kuystudio"
            target="_blank"
        >
            BagiBagi
        </a>
        <a
            class="btn"
            href="https://sociabuzz.com/kuystudio/tribe"
            target="_blank"
        >
            Sociabuzz
        </a>
    </div>
    <div class="footer">
        © 2026 KUY Studio
    </div>
</div>
<script>
const loader =
    document.getElementById("loader");
const mainContent =
    document.getElementById("mainContent");
const backgroundVideo =
    document.getElementById("backgroundVideo");
let videoReady = false;
let pageReady = false;
/* VIDEO SIAP */
backgroundVideo.addEventListener(
    "canplay",
    function(){
        videoReady = true;
        backgroundVideo.classList.add("ready");
        checkReady();
    }
);
backgroundVideo.addEventListener(
    "error",
    function(){
        videoReady = true;
        checkReady();
    }
);
window.addEventListener(
    "load",
    function(){
        pageReady = true;
        checkReady();
    }
);
function checkReady(){
    if(
        videoReady &&
        pageReady
    ){
        setTimeout(
            function(){
                loader.classList.add("hide");
                mainContent.classList.add("show");
                document.body.style.overflow = "auto";
            },
            500
        );
    }
}
setTimeout(
    function(){
        if(
            !mainContent.classList.contains("show")
        ){
            loader.classList.add("hide");
            mainContent.classList.add("show");
            document.body.style.overflow = "auto";
        }
    },
    5000
);
</script>
</body>
</html>
