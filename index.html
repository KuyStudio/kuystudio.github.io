<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUY Studio</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Inter,Arial,sans-serif;
    background:
    linear-gradient(
        180deg,
        #7c3aed 0%,
        #4f46e5 45%,
        #2563eb 100%
    );
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.container{
    width:100%;
    max-width:380px;
    text-align:center;
    background:rgba(255,255,255,.13);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:26px;
    padding:35px 25px;
    box-shadow:
    0 25px 60px rgba(0,0,0,.25);
}
.logo{
    width:110px;
    height:110px;
    object-fit:cover;
    border-radius:50%;
    margin-bottom:18px;
    border:4px solid rgba(255,255,255,.9);
    box-shadow:
    0 10px 30px rgba(0,0,0,.3);
}
h1{
    color:white;
    font-size:32px;
    margin-bottom:8px;
    letter-spacing:.5px;
}
.desc{
    color:rgba(255,255,255,.9);
    line-height:1.6;
    font-size:15px;
    margin-bottom:20px;
}
.note{
    background:rgba(255,247,237,.95);
    border:1px solid #fdba74;
    color:#9a3412;
    border-radius:16px;
    padding:14px;
    margin-bottom:20px;
    font-size:14px;
    line-height:1.5;
    box-shadow:
    0 8px 20px rgba(0,0,0,.12);
}
.link-list{
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.25);
    border-radius:20px;
    padding:14px;
    margin-bottom:20px;
    box-shadow:
    0 12px 30px rgba(0,0,0,.18);
    backdrop-filter:blur(10px);
}
/* BUTTON */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:15px;
    margin-bottom:10px;
    text-decoration:none;
    color:white;
    background:
    rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.25);
    border-radius:14px;
    font-weight:700;
    font-size:16px;
    box-shadow:
    0 6px 18px rgba(0,0,0,.12);
    transition:.25s ease;
}
.btn:last-child{
    margin-bottom:0;
}
.btn:hover{
    transform:
    translateY(-3px);
    background:white;
    color:#4f46e5;
    box-shadow:
    0 12px 30px rgba(0,0,0,.25);
}
.footer{
    margin-top:25px;
    color:rgba(255,255,255,.75);
    font-size:13px;
}
</style>
</head>
<body>
<div class="container">
    <img src="KuyLogo.png" class="logo" alt="KUY Studio">
    <h1>Kuy Studio</h1>
    <p class="desc">
        Terima kasih atas support dan dukungannya
    </p>
    <div class="note">
        <strong>NOTE</strong><br>
        Masukkan <strong>Username Roblox</strong> kalian agar data dapat masuk ke map.
    </div>
    <div class="link-list">
        <a class="btn" href="https://bagibagi.co/KUY.RBX" target="_blank">
            BagiBagi
        </a>
        <a class="btn" href="https://sociabuzz.com/kuystudio/tribe" target="_blank">
            Sociabuzz
        </a>
    </div>
    <div class="footer">
        © 2026 KUY Studio
    </div>
</div>
</body>
</html>
